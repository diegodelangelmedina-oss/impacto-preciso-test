<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impacto Preciso</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#000000,#1a0000,#330000);
  color:white;
  text-align:center;
  overflow-x:hidden;
}
body::before{
  content:"IMPACTO PRECISO";
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:100px;
  font-weight:bold;
  color:rgba(255,0,0,0.05);
  white-space:nowrap;
  pointer-events:none;
  z-index:0;
}
header{padding:20px;position:relative;z-index:1;}
h1{color:#ff1a1a;text-shadow:0 0 15px red;}
.game-container{display:flex;flex-wrap:wrap;justify-content:center;gap:40px;padding:20px;position:relative;z-index:1;}
#board{width:320px;height:320px;border-radius:50%;background:radial-gradient(circle, red 20%, white 20%, white 40%, red 40%, red 60%, white 60%, white 80%, red 80%);position:relative;cursor:pointer;box-shadow:0 0 30px red;transition:box-shadow 0.4s;}
#dart{width:20px;height:20px;background:black;border-radius:50%;position:absolute;transform:translate(-50%,-50%);display:none;}
#ranking{width:260px;background:rgba(255,0,0,0.1);padding:15px;border-radius:10px;backdrop-filter:blur(10px);box-shadow:0 0 15px red;}
#ranking h3{color:#ff3333;}
input,select,button{padding:8px;margin:5px;border-radius:5px;border:none;}
button{cursor:pointer;background:#ff1a1a;color:white;font-weight:bold;}
button:hover{background:#cc0000;}
.top1{color:gold;font-weight:bold;font-size:18px;}
#welcomeScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#000000,#1a0000,#330000);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeIn 1s ease-in-out;
  transition: opacity 0.8s ease;
}
.welcome-content{text-align:center;animation:slideUp 1s ease-out;}
.title{font-size:50px;color:#ff1a1a;text-shadow:0 0 20px red;}
.subtitle{font-size:22px;color:#ff6666;}
.welcome-text{margin:20px 0;max-width:500px;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
header, .game-container, #timer, #score {
  display: none;
}
#feedbackText {
  position:absolute;
  left:50%;
  top:40%;
  transform:translate(-50%, -50%);
  font-size:32px;
  font-weight:bold;
  color:#ffff00;
  text-shadow:0 0 12px #ff8800, 0 0 20px #ff5500;
  pointer-events:none;
  z-index:10;
  opacity:0;
  transition:opacity 0.6s, transform 0.6s;
}
#board.hit {
  animation: glow 0.6s ease-out;
}
@keyframes glow {
  0% { box-shadow: 0 0 30px red; }
  50% { box-shadow: 0 0 70px #ff4444, 0 0 120px #ff0000; }
  100% { box-shadow: 0 0 30px red; }
}
@keyframes floatUp {
  0% { opacity:0; transform:translate(-50%, -50%) scale(0.6); }
  20% { opacity:1; transform:translate(-50%, -120%) scale(1.3); }
  80% { opacity:1; transform:translate(-50%, -140%) scale(1.1); }
  100% { opacity:0; transform:translate(-50%, -180%) scale(1); }
}
</style>
</head>
<body>

<div id="welcomeScreen">
  <div class="welcome-content">
    <h1 class="title">IMPACTO PRECISO 🎯</h1>
    <p class="subtitle">Proyecto Universitario</p>
    <p>Materia: Formación de Emprendedores</p>
    <p class="welcome-text">
      Hola 👋 Bienvenido a nuestro proyecto universitario.<br>
      Pon a prueba tu precisión y compite en el ranking global.
    </p>
    <button onclick="enterGame()">Entrar al juego 🚀</button>
  </div>
</div>

<header>
  <h1>Impacto Preciso RD 🎯</h1>
</header>

<input type="text" id="playerName" placeholder="Tu nombre">
<select id="difficulty">
  <option value="easy">Fácil</option>
  <option value="medium">Medio</option>
  <option value="hard">Difícil</option>
</select>
<button onclick="startGame()">Iniciar Juego</button>
<button onclick="resetGame()">Reiniciar</button>

<h2 id="timer">Tiempo: 10</h2>
<h2 id="score">Puntos: 0</h2>

<div class="game-container">
  <div id="board" onclick="throwDart(event)">
    <div id="dart"></div>
  </div>
  <div id="ranking">
    <h3>🏆 Ranking Global</h3>
    <div id="rankingList"></div>
  </div>
</div>

<div id="feedbackText"></div>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "impacto-preciso.firebaseapp.com",
  projectId: "impacto-preciso",
  storageBucket: "impacto-preciso.appspot.com",
  messagingSenderId: "769895871874",
  appId: "1:769895871874:web:a964369999bdd42cc04b9b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let time = 10;
let score = 0;
let difficultyMultiplier = 1;
let gameActive = false;
let interval = null;
let canThrow = true;
let currentPlayerName = "";

// Recordar nombre al cargar
window.addEventListener('load', () => {
  const saved = localStorage.getItem('lastPlayerName');
  if (saved) {
    document.getElementById('playerName').value = saved;
    console.log("Nombre recordado:", saved);
  }
});

function enterGame() {
  const welcome = document.getElementById("welcomeScreen");
  if (!welcome) return;
  welcome.style.opacity = "0";
  setTimeout(() => {
    welcome.remove();
    document.querySelector("header").style.display = "block";
    document.getElementById("timer").style.display = "block";
    document.getElementById("score").style.display = "block";
    document.querySelector(".game-container").style.display = "flex";
    document.getElementById("playerName").focus();
  }, 800);
}

function startGame(){
  const nameInput = document.getElementById("playerName");
  const name = nameInput.value.trim();
  const difficulty = document.getElementById("difficulty").value;

  if(name === "") {
    alert("Escribe tu nombre");
    return;
  }

  localStorage.setItem('lastPlayerName', name);
  currentPlayerName = name;
  console.log("Partida iniciada para:", name);

  if(difficulty === "easy") { time = 15; difficultyMultiplier = 1; }
  else if(difficulty === "medium"){ time = 10; difficultyMultiplier = 1.5; }
  else { time = 7; difficultyMultiplier = 2; }

  score = 0;
  gameActive = true;
  document.getElementById("score").innerText = "Puntos: 0";
  document.getElementById("timer").innerText = "Tiempo: " + time;

  if(interval) clearInterval(interval);

  interval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "Tiempo: " + time;
    if(time <= 0){
      clearInterval(interval);
      gameActive = false;
      alert("¡Juego terminado! Tu puntaje fue: " + score);
      if (currentPlayerName) {
        saveScore(currentPlayerName, score);
      } else {
        console.error("No hay nombre para guardar");
      }
    }
  }, 1000);
}

function resetGame(){
  clearInterval(interval);
  gameActive = false;
  time = 10;
  score = 0;
  document.getElementById("timer").innerText = "Tiempo: 10";
  document.getElementById("score").innerText = "Puntos: 0";
}

function throwDart(event){
  if(!gameActive || !canThrow) return;
  canThrow = false;
  setTimeout(() => { canThrow = true; }, 180);

  const board = document.getElementById("board");
  const rect = board.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  const centerX = rect.width / 2;
  const centerY = rect.height / 2;
  const distance = Math.sqrt((x - centerX)**2 + (y - centerY)**2);

  if (distance > 160) return;

  let points = 0;
  if (distance < 30) points = 100;
  else if (distance < 60) points = 80;
  else if (distance < 90) points = 60;
  else if (distance < 120) points = 40;
  else if (distance < 150) points = 20;

  const totalPoints = Math.floor(points * difficultyMultiplier);
  score += totalPoints;
  document.getElementById("score").innerText = "Puntos: " + score;

  const dart = document.getElementById("dart");
  dart.style.left = x + "px";
  dart.style.top = y + "px";
  dart.style.display = "block";
  setTimeout(() => { dart.style.display = "none"; }, 700);

  board.classList.add("hit");
  setTimeout(() => board.classList.remove("hit"), 600);

  const feedback = document.getElementById("feedbackText");
  feedback.innerText = "+" + totalPoints + " pts!";
  feedback.style.animation = "none";
  feedback.offsetHeight;
  feedback.style.animation = "floatUp 1.4s ease-out forwards";
  feedback.style.opacity = "1";

  const audio = new Audio("https://cdn.freesound.org/previews/387/387232_7253554-lq.mp3");
  audio.volume = 0.5;
  audio.play().catch(() => {});

  setTimeout(() => {
    feedback.style.opacity = "0";
  }, 1400);
}

async function saveScore(nombre, puntosNuevos) {
  console.log("Intentando guardar:", nombre, puntosNuevos);

  try {
    const q = db.collection("ranking").where("nombre", "==", nombre).limit(1);
    const querySnapshot = await q.get();

    if (!querySnapshot.empty) {
      const doc = querySnapshot.docs[0];
      const oldScore = doc.data().puntos || 0;
      console.log("Puntaje anterior encontrado:", oldScore);

      if (puntosNuevos > oldScore) {
        await doc.ref.update({
          puntos: puntosNuevos,
          fecha: firebase.firestore.FieldValue.serverTimestamp()
        });
        console.log("¡Récord actualizado!");
      } else {
        console.log("Puntaje no mejorado, no se guarda");
      }
    } else {
      await db.collection("ranking").add({
        nombre: nombre,
        puntos: puntosNuevos,
        fecha: firebase.firestore.FieldValue.serverTimestamp()
      });
      console.log("Nuevo jugador registrado");
    }
  } catch (err) {
    console.error("ERROR al guardar puntaje:", err);
    alert("Error al guardar puntaje. Revisa consola (F12).");
  }
}

db.collection("ranking")
  .orderBy("puntos", "desc")
  .limit(10)
  .onSnapshot(snapshot => {
    let html = "";
    let position = 1;
    snapshot.forEach(doc => {
      const data = doc.data();
      let medal = position === 1 ? "🥇" : position === 2 ? "🥈" : position === 3 ? "🥉" : "";
      const className = position === 1 ? ' class="top1"' : '';
      html += `<p${className}>${medal} ${data.nombre} - ${data.puntos} pts</p>`;
      position++;
    });
    document.getElementById("rankingList").innerHTML = html || "<p>Aún no hay puntajes</p>";
  });
</script>
</body>
</html>
