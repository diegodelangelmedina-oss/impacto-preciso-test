<!-- Agrega esto al final de tu <style> (después de lo que ya tienes) -->
<style>
  /* ... tus estilos anteriores ... */

  #statsScreen, #achievements {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
  }

  .stats-content, .achievements-content {
    background: rgba(50,0,0,0.8);
    padding: 30px;
    border-radius: 15px;
    max-width: 90%;
    box-shadow: 0 0 30px red;
  }

  .badge {
    display: inline-block;
    background: #ff4444;
    color: white;
    padding: 6px 12px;
    margin: 6px;
    border-radius: 20px;
    font-size: 14px;
    box-shadow: 0 0 10px #ff0000;
  }

  .unlocked { background: #ffaa00; box-shadow: 0 0 15px gold; }

  #precisionStat { font-size: 28px; font-weight: bold; color: #ffff00; }
</style>

<!-- Nuevos elementos en el body (agrega después del #feedbackText) -->
<div id="statsScreen">
  <div class="stats-content">
    <h2>¡Partida terminada, ${currentPlayerName}!</h2>
    <p>Puntaje final: <strong id="finalScore"></strong></p>
    <p>Lanzamientos: <strong id="throwsCount"></strong></p>
    <p>Precisión: <span id="precisionStat">0%</span></p>
    <div id="achievementsEarned"></div>
    <button onclick="closeStats()" style="margin-top:20px;">Volver al juego</button>
  </div>
</div>

<div id="achievements">
  <div class="achievements-content">
    <h2>Tus Logros 🎖️</h2>
    <div id="achievementsList"></div>
    <button onclick="document.getElementById('achievements').style.display='none'">Cerrar</button>
  </div>
</div>

<!-- ... el resto de tu HTML (welcomeScreen, header, inputs, board, ranking, etc.) se mantiene igual ... -->

<script>
// ───────────────────────────────────────────────
// Tus variables y funciones anteriores se mantienen
// ───────────────────────────────────────────────

let throwsCount = 0;           // nuevo: contador de lanzamientos
let bullseyeCount = 0;         // para logros
let perfectStreak = 0;         // racha de 100 pts
let maxStreak = 0;

// Agrega esto dentro de throwDart (al inicio de la función)
function throwDart(event){
  if(!gameActive || !canThrow) return;

  // Anti-spam: mínimo 180ms entre clics (ya lo tenías, pero reforzamos)
  canThrow = false;
  setTimeout(() => { canThrow = true; }, 180);

  throwsCount++;  // nuevo

  // ... el resto de tu throwDart (cálculo de x,y, distance, points, totalPoints, etc.) ...

  // Después de calcular totalPoints:
  score += totalPoints;
  document.getElementById("score").innerText = "Puntos: " + score;

  // Para logros
  if (points === 100) {
    bullseyeCount++;
    perfectStreak++;
    maxStreak = Math.max(maxStreak, perfectStreak);
  } else {
    perfectStreak = 0;
  }

  // Animación del dardo (ya la tenías mejorada)
  dart.style.left = x + "px";
  dart.style.top = y + "px";
  dart.style.display = "block";
  dart.style.animation = "none";
  dart.offsetHeight;
  dart.style.animation = "dartThrow 0.35s ease-out";
  setTimeout(() => { dart.style.display = "none"; }, 700);

  // ... resto de animaciones, feedback, sonido ...
}

// Modifica el final del timer (cuando time <= 0)
if(time <= 0){
  clearInterval(interval);
  gameActive = false;

  // Puntaje máximo teórico aproximado (anti-cheat simple)
  const maxPossible = difficultyMultiplier === 1 ? 1500 : difficultyMultiplier === 1.5 ? 2250 : 3000;
  if (score > maxPossible) {
    alert("¡Puntaje imposible detectado! No se guardará.");
    console.warn("Anti-cheat: puntaje excedió máximo teórico");
    return;
  }

  const finalScoreText = `¡Juego terminado! Puntaje: ${score}`;
  alert(finalScoreText);

  if (currentPlayerName) {
    saveScore(currentPlayerName, score);
    showStatsAndAchievements(score);
  }
}

// Nueva función: mostrar estadísticas y logros al terminar
function showStatsAndAchievements(finalScore) {
  const accuracy = throwsCount > 0 ? Math.round((bullseyeCount / throwsCount) * 100) : 0;

  document.getElementById("finalScore").innerText = finalScore + " pts";
  document.getElementById("throwsCount").innerText = throwsCount;
  document.getElementById("precisionStat").innerText = accuracy + "%";
  document.getElementById("precisionStat").style.color = accuracy >= 50 ? "#00ff88" : accuracy >= 30 ? "#ffff00" : "#ff4444";

  // Logros
  let earned = [];
  const achievements = JSON.parse(localStorage.getItem('achievements') || '{}');

  // Definición de logros (puedes agregar más)
  const achievementList = [
    { id: "first500", name: "Primeros 500", cond: finalScore >= 500, desc: "Llegaste a 500 pts en una partida" },
    { id: "bullseye5", name: "Bullseye x5", cond: bullseyeCount >= 5, desc: "5 tiros al centro en una partida" },
    { id: "perfect3",  name: "Racha perfecta", cond: perfectStreak >= 3, desc: "3 tiros perfectos seguidos" },
    { id: "master",    name: "Maestro del centro", cond: accuracy >= 60, desc: "Más del 60% de precisión" }
  ];

  let html = "";
  achievementList.forEach(ach => {
    if (ach.cond && !achievements[ach.id]) {
      achievements[ach.id] = true;
      earned.push(ach.name);
    }
    const unlocked = achievements[ach.id] ? "unlocked" : "";
    html += `<div class="badge ${unlocked}">${ach.name}</div>`;
  });

  localStorage.setItem('achievements', JSON.stringify(achievements));

  document.getElementById("achievementsEarned").innerHTML = earned.length > 0 
    ? "<h3>Nuevos logros desbloqueados:</h3>" + earned.map(e => `<div class="badge unlocked">${e}</div>`).join("")
    : "<p>¡Sigue jugando para desbloquear logros!</p>";

  document.getElementById("statsScreen").style.display = "flex";

  // También actualizamos la lista completa de logros si quieres un botón para verla
  document.getElementById("achievementsList").innerHTML = html || "<p>Aún sin logros</p>";
}

// Cerrar pantalla de stats
function closeStats() {
  document.getElementById("statsScreen").style.display = "none";
  resetGame(); // o no, según prefieras
  throwsCount = 0;
  bullseyeCount = 0;
  perfectStreak = 0;
  maxStreak = 0;
}

// Bonus: botón para ver logros en cualquier momento (agrega donde quieras, ej en header)
function showAchievements() {
  const achievements = JSON.parse(localStorage.getItem('achievements') || '{}');
  let html = "";
  // Usa la misma lista de arriba para mostrar todos
  const achievementList = [ /* copia la lista de arriba */ ];
  achievementList.forEach(ach => {
    const unlocked = achievements[ach.id] ? "unlocked" : "";
    html += `<div class="badge ${unlocked}">${ach.name}</div>`;
  });
  document.getElementById("achievementsList").innerHTML = html || "<p>Aún sin logros</p>";
  document.getElementById("achievements").style.display = "flex";
}

// Ranking sigue igual, solo con .limit(25) y #${position} como ya cambiaste

</script>
